# Dependabot configuration.
#
# The repo had security ALERTS enabled (the "N vulnerabilities" banner) but no
# dependabot.yml, so Dependabot was never opening update PRs — the backlog just
# accumulated. This config turns on managed version + security updates for all
# three ecosystems, delivered as GROUPED PRs so a large backlog arrives as a
# handful of reviewable PRs instead of dozens of isolated ones.
#
# Note on the frontend: most JS advisories are deep-transitive dependencies
# inside Expo's own toolchain (e.g. expo > @expo/cli > ... > xcode > uuid).
# Those cannot be fixed by bumping package.json directly — they clear only when
# the Expo SDK itself updates (a native EAS rebuild). Dependabot will still
# surface the ones that ARE directly bumpable.
version: 2
updates:
  # ── Backend (Python / pip) ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      backend-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(backend)"

  # ── Frontend (JavaScript / npm + yarn) ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # These packages are pinned to Expo SDK 54 / React Native 0.81.5. Bumping
    # any of them without a full EAS binary rebuild causes JS/native mismatches
    # that crash the app on device. Ignore ALL version updates — upgrades must
    # go through a deliberate SDK upgrade cycle, not Dependabot automation.
    ignore:
      # Core React Native runtime — native binary is compiled against these
      - dependency-name: "react-native"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      # Expo SDK toolchain — preset version is tightly coupled to the SDK
      - dependency-name: "expo"
      - dependency-name: "babel-preset-expo"
      # Expo SDK 54-pinned native modules — JS must match the compiled binary
      - dependency-name: "expo-auth-session"
      - dependency-name: "expo-blur"
      - dependency-name: "expo-camera"
      - dependency-name: "expo-crypto"
      - dependency-name: "expo-dev-client"
      - dependency-name: "expo-haptics"
      - dependency-name: "expo-image"
      - dependency-name: "expo-keep-awake"
      - dependency-name: "expo-linear-gradient"
      - dependency-name: "expo-location"
      - dependency-name: "expo-task-manager"
      - dependency-name: "expo-updates"
      # React Native ecosystem — v3 RNGH removed Swipeable; map layer id crash at v12+
      - dependency-name: "react-native-gesture-handler"
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-safe-area-context"
      - dependency-name: "react-native-screens"
      - dependency-name: "react-native-svg"
      - dependency-name: "react-native-webview"
      - dependency-name: "@maplibre/maplibre-react-native"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(frontend)"

  # ── GitHub Actions workflows ────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
