# Dependabot configuration.
#
# The repo had security ALERTS enabled (the "N vulnerabilities" banner) but no
# dependabot.yml, so Dependabot was never opening update PRs — the backlog just
# accumulated. This config turns on managed version + security updates for all
# three ecosystems, delivered as GROUPED PRs so a large backlog arrives as a
# handful of reviewable PRs instead of dozens of isolated ones.
#
# Note on the frontend: most JS advisories are deep-transitive dependencies
# inside Expo's own toolchain (e.g. expo > @expo/cli > ... > xcode > uuid).
# Those cannot be fixed by bumping package.json directly — they clear only when
# the Expo SDK itself updates (a native EAS rebuild). Dependabot will still
# surface the ones that ARE directly bumpable.
version: 2
updates:
  # ── Backend (Python / pip) ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      backend-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(backend)"

  # ── Frontend (JavaScript / npm + yarn) ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # These packages are pinned to Expo SDK 54 / React Native 0.81.5. Bumping
    # any of them without a full EAS binary rebuild causes JS/native mismatches
    # that crash the app on device. Ignore ALL version updates — upgrades must
    # go through a deliberate SDK upgrade cycle, not Dependabot automation.
    #
    # Wildcards, not an enumerated list: the 2026-06-11 incident happened
    # because an explicit list missed expo-font/-splash-screen/-status-bar/
    # -system-ui/-web-browser/-document-picker/-build-properties,
    # react-native-worklets and @react-native-community/netinfo — Dependabot
    # bumped them to SDK 56 versions on an SDK 54 binary and the OTA crashed
    # every device on launch (PR #88 reverted it).
    ignore:
      # Core React Native runtime — native binary is compiled against these
      - dependency-name: "react-native"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      # Expo SDK — covers expo itself and every expo-* module; all are
      # SDK-versioned and must move together with a new binary
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: "babel-preset-expo"
      # Native modules under org scopes — JS must match the compiled binary
      - dependency-name: "@react-native-community/*"
      - dependency-name: "@react-native-async-storage/*"
      - dependency-name: "@react-native-google-signin/*"
      - dependency-name: "@maplibre/maplibre-react-native"
      # React Native ecosystem native modules — v3 RNGH removed Swipeable;
      # map layer id crash at v12+; worklets enforces exact JS/native match
      - dependency-name: "react-native-gesture-handler"
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-worklets"
      - dependency-name: "react-native-safe-area-context"
      - dependency-name: "react-native-screens"
      - dependency-name: "react-native-svg"
      - dependency-name: "react-native-webview"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(frontend)"

  # ── GitHub Actions workflows ────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
