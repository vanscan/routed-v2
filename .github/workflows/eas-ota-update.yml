name: EAS OTA Update on Tag

# Triggers an Expo OTA update (`eas update --branch production`) on any
# version tag push. JS-only changes ship in ~30 seconds to all installed
# Android apps without a Play Store re-review.
#
# Setup (one-time):
#   1. In Expo dashboard → Access Tokens → create a new token
#   2. In GitHub repo → Settings → Secrets → Actions → add:
#        EXPO_TOKEN = <the token>
#   3. Push a tag like `v2026.05.20` and the workflow auto-runs.
#
# For binary (AAB) releases use `eas build --platform android --profile production`
# from your laptop — those should NOT be automated until you have a
# release-signing keystore in EAS Secrets, otherwise Play Store will
# reject the upload for mismatched signatures.
#
# To roll back a bad OTA: `eas update:rollback --branch production` (local).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'ota-*'           # opt-in: tag `ota-fix-resume` to ship without bumping version
  workflow_dispatch:       # also allow manual trigger from GH UI
    inputs:
      message:
        description: 'Update message shown in Expo dashboard'
        required: false
        default: 'Manual OTA update'

jobs:
  ota-update:
    name: Publish OTA bundle
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: ota-${{ github.ref }}
      cancel-in-progress: false   # never cancel an in-flight publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0          # eas needs full history for runtimeVersion

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: frontend
        # --frozen-lockfile (matches eas-build-android.yml) so an OTA can never
        # silently ship JS built against different deps than the tested native
        # binary. If this fails, run `yarn install` locally and commit yarn.lock.
        run: yarn install --frozen-lockfile

      - name: Cache hermesc binary
        id: hermesc-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/hermesc
          key: hermesc-linux64-${{ hashFiles('frontend/package.json') }}

      - name: Ensure hermesc binary
        working-directory: frontend
        # RN ≤ 0.72 bundled hermesc in the npm tarball; RN 0.76+ removed it —
        # the binary is now built from source by Gradle during native Android builds.
        # For OTA-only CI runs (no Gradle), we must supply it ourselves.
        # Priority: (1) yarn install already placed it, (2) restored from CI cache,
        # (3) build from the Hermes source tag declared in sdks/.hermesversion.
        run: |
          HERMESC="node_modules/react-native/sdks/hermesc/linux64-bin/hermesc"
          CACHE_BIN="$HOME/.cache/hermesc/hermesc"
          if [ -f "$HERMESC" ]; then
            chmod +x "$HERMESC"
            echo "✓ hermesc present ($(stat -c %s "$HERMESC") bytes)"
          elif [ -f "$CACHE_BIN" ]; then
            mkdir -p "$(dirname "$HERMESC")"
            cp "$CACHE_BIN" "$HERMESC"
            chmod +x "$HERMESC"
            echo "✓ hermesc restored from CI cache ($(stat -c %s "$HERMESC") bytes)"
          else
            echo "hermesc missing — building from Hermes source..."
            HERMES_TAG=$(tr -d '\n' < node_modules/react-native/sdks/.hermesversion)
            echo "Hermes tag: ${HERMES_TAG}"
            sudo apt-get install -y --no-install-recommends ninja-build
            curl -fL "https://github.com/facebook/hermes/tarball/${HERMES_TAG}" \
              -o /tmp/hermes-src.tar.gz
            mkdir -p /tmp/hermes-src
            tar xzf /tmp/hermes-src.tar.gz -C /tmp/hermes-src --strip-components=1
            rm /tmp/hermes-src.tar.gz
            cmake /tmp/hermes-src -B /tmp/hermes-build \
              -DCMAKE_BUILD_TYPE=Release \
              -DHERMES_BUILD_APPLE_FRAMEWORK=OFF \
              -DHERMES_ENABLE_TEST_SUITE=OFF \
              -G Ninja
            cmake --build /tmp/hermes-build --target hermesc -j$(nproc)
            mkdir -p "$(dirname "$HERMESC")" "$(dirname "$CACHE_BIN")"
            cp /tmp/hermes-build/bin/hermesc "$HERMESC"
            cp /tmp/hermes-build/bin/hermesc "$CACHE_BIN"
            rm -rf /tmp/hermes-src /tmp/hermes-build
            chmod +x "$HERMESC"
            echo "✓ hermesc built from ${HERMES_TAG} ($(stat -c %s "$HERMESC") bytes)"
          fi

      - name: Pre-deploy audit (lightweight)
        run: |
          # Same checks as scripts/predeploy.sh but inline for CI speed.
          # Fails the workflow if eas.json has the rejected Proguard key.
          if grep -q "enableProguardInReleaseBuilds" frontend/eas.json; then
            echo "::error::eas.json contains 'enableProguardInReleaseBuilds' — remove it"
            exit 1
          fi
          # Ensure frontend/.env exists with the production backend URL.
          # The app hardcodes this URL as a fallback, but eas update reads .env
          # during bundling. Create it if missing (CI runners never have .env).
          if [ ! -f frontend/.env ]; then
            echo "EXPO_PUBLIC_BACKEND_URL=https://api.getrouted.xyz" > frontend/.env
            echo "Created frontend/.env with production backend URL"
          fi
          if ! grep -qE "^EXPO_PUBLIC_BACKEND_URL=https://" frontend/.env; then
            echo "::error::frontend/.env missing EXPO_PUBLIC_BACKEND_URL"
            exit 1
          fi
          echo "✓ pre-flight clean"

      - name: Publish OTA update
        working-directory: frontend
        env:
          # Tag → message: `v2026.05.20` becomes message "v2026.05.20".
          # Manual dispatch uses the input message.
          MSG: ${{ github.event.inputs.message || github.ref_name }}
        run: |
          echo "Publishing OTA for tag/branch: $MSG"
          eas update --branch production --message "$MSG" --non-interactive

      - name: Summary
        if: always()
        run: |
          echo "### OTA update ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`production\`" >> $GITHUB_STEP_SUMMARY
          echo "Message: \`${{ github.event.inputs.message || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rollback: \`eas update:rollback --branch production\` (run locally)" >> $GITHUB_STEP_SUMMARY
